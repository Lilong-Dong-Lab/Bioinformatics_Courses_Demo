[workspace]
authors = ["hugolld <hugo.lilong.dong@outlook.com>"]
channels = ["conda-forge", "bioconda"]
name = "BIOINFO_Demo_BLAST"
platforms = ["osx-arm64"]
version = "0.1.0"

[dependencies]
blast = ">=2.15.0"
python = ">=3.10.0"
biopython = ">=1.86,<2"
pandas = ">=2.0.0"
matplotlib = ">=3.8.0"

# Testing dependencies
pytest = ">=8.0.0"
pytest-mock = ">=3.12.0"
pytest-cov = ">=4.1.0"

[tasks]
# Verify BLAST+ installation
verify-blast = "blastp -version"

# Main demo: EGFR kinase domain BLAST (aligned with lecture materials)
run-blast = "python scripts/run_blast_cli.py"
run-remote-blast = "python scripts/remote_blast_demo.py"
run-biopython-blast = "python scripts/biopython_remote_blast.py"

# Testing tasks
test = "pytest tests/ -v"
test-cov = "pytest tests/ -v --cov=scripts --cov-report=term-missing"
test-verbose = "pytest tests/ -v -s --tb=long"
test-cli = "pytest tests/test_run_blast_cli.py -v"
test-biopython = "pytest tests/test_biopython_remote_blast.py -v"
